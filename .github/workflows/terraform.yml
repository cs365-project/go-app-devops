name: Terraform EKS

on:
  push:
    branches:
      - develop
      - uat
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action (bootstrap/plan/apply/destroy)'
        required: true
        default: 'plan'
        type: choice
        options:
          - bootstrap
          - plan
          - apply
          - destroy

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/eks

permissions:
  contents: read
  pull-requests: write

jobs:
  bootstrap:
    name: Bootstrap Remote State
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'bootstrap'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap S3 + DynamoDB
        run: |
          chmod +x bootstrap-remote-state.sh
          ./bootstrap-remote-state.sh

  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'bootstrap'
    outputs:
      applied: ${{ steps.apply.outcome }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=dev.tfvars -out=tfplan -no-color
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform Init ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validate 🤖 \`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        id: apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -var-file=dev.tfvars -auto-approve

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file=dev.tfvars -auto-approve

  install-argocd:
    name: Install ArgoCD
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event.inputs.action == 'apply' && needs.terraform.outputs.applied == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name cs365-eks-cluster

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argocd --server-side \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl wait --for=condition=available deployment/argocd-server \
            -n argocd --timeout=300s

      - name: Apply ArgoCD Application
        run: kubectl apply -f argocd/application.yaml

      - name: Wait for ArgoCD to Sync
        run: |
          echo "Waiting for go-portfolio to sync..."
          for i in $(seq 1 20); do
            SYNC=$(kubectl get application go-portfolio -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null)
            HEALTH=$(kubectl get application go-portfolio -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null)
            echo "[$i/20] Sync: $SYNC | Health: $HEALTH"
            if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "✅ App is Synced and Healthy"
              exit 0
            fi
            sleep 15
          done
          echo "❌ Timeout waiting for sync"
          kubectl describe application go-portfolio -n argocd
          exit 1

      - name: Print App Status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n go-app
          echo "=== Service ==="
          kubectl get svc -n go-app
          echo "=== Ingress ==="
          kubectl get ingress -n go-app
          echo "=== ArgoCD Admin Password ==="
          kubectl get secret argocd-initial-admin-secret \
            -n argocd \
            -o jsonpath="{.data.password}" | base64 -d
          echo ""
