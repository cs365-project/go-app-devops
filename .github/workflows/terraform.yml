name: Terraform EKS

on:
  push:
    branches:
      - develop
      - uat
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action (bootstrap/plan/apply/destroy)'
        required: true
        default: 'plan'
        type: choice
        options:
          - bootstrap
          - plan
          - apply
          - destroy

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/eks

permissions:
  contents: read
  pull-requests: write

jobs:
  bootstrap:
    name: Bootstrap Remote State
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'bootstrap'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap S3 + DynamoDB
        run: |
          chmod +x bootstrap-remote-state.sh
          ./bootstrap-remote-state.sh

  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'bootstrap'
    outputs:
      applied: ${{ steps.apply.outcome }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -upgrade

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=dev.tfvars -out=tfplan -no-color
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform Init ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validate 🤖 \`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Ensure SG rule (jump -> EKS API :443)
        if: github.event.inputs.action == 'apply'
        run: |
          EKS_SG=$(aws eks describe-cluster \
            --name cs365-eks-cluster --region us-east-1 \
            --query "cluster.resourcesVpcConfig.clusterSecurityGroupId" \
            --output text)
          JUMP_SG=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=cs365-eks-cluster-jump" \
                      "Name=instance-state-name,Values=running,stopped" \
            --query "Reservations[0].Instances[0].SecurityGroups[0].GroupId" \
            --output text --region us-east-1)
          echo "EKS SG: $EKS_SG  |  Jump SG: $JUMP_SG"
          RULE_ID=$(aws ec2 describe-security-group-rules \
            --filters "Name=group-id,Values=${EKS_SG}" \
                      "Name=ip-permission.from-port,Values=443" \
                      "Name=ip-permission.to-port,Values=443" \
                      "Name=ip-permission.protocol,Values=tcp" \
            --query "SecurityGroupRules[?ReferencedGroupInfo.GroupId=='${JUMP_SG}'].SecurityGroupRuleId" \
            --output text --region us-east-1 2>/dev/null || true)
          if [ -n "$RULE_ID" ] && [ "$RULE_ID" != "None" ]; then
            echo "SG rule already exists ($RULE_ID) — nothing to do"
          else
            echo "Creating SG rule: $JUMP_SG -> $EKS_SG :443"
            aws ec2 authorize-security-group-ingress \
              --group-id "$EKS_SG" \
              --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":443,\"ToPort\":443,\"UserIdGroupPairs\":[{\"GroupId\":\"${JUMP_SG}\",\"Description\":\"Allow jump server to access EKS API\"}]}]" \
              --region us-east-1
          fi

      - name: Terraform Apply
        id: apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -var-file=dev.tfvars -auto-approve

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file=dev.tfvars -auto-approve

  install-argocd:
    name: Install ArgoCD
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event.inputs.action == 'apply' && needs.terraform.outputs.applied == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name cs365-eks-cluster

      - name: Patch aws-auth (add LabRole as cluster-admin)
        run: |
          LAB_ROLE_ARN=$(aws iam get-role --role-name LabRole --query "Role.Arn" --output text)
          NODE_ROLE_ARN=$(aws iam list-roles --query "Roles[?contains(RoleName, 'LabEksNodeRole')].Arn | [0]" --output text)
          kubectl patch configmap aws-auth -n kube-system --patch "$(cat <<EOF
          data:
            mapRoles: |
              - rolearn: ${NODE_ROLE_ARN}
                username: system:node:{{EC2PrivateDNSName}}
                groups:
                  - system:bootstrappers
                  - system:nodes
              - rolearn: ${LAB_ROLE_ARN}
                username: admin
                groups:
                  - system:masters
          EOF
          )"
          echo "aws-auth patched with LabRole: ${LAB_ROLE_ARN}"

      - name: Install Nginx Ingress Controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argocd --server-side \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml \
            || true
          kubectl wait --for=condition=available deployment/argocd-server \
            -n argocd --timeout=300s

      - name: Apply ArgoCD Application
        run: kubectl apply -f argocd/application.yaml

      - name: Wait for ArgoCD to Sync
        run: |
          echo "Waiting for go-portfolio to sync..."
          for i in $(seq 1 30); do
            SYNC=$(kubectl get application go-portfolio -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null)
            HEALTH=$(kubectl get application go-portfolio -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null)
            echo "[$i/30] Sync: $SYNC | Health: $HEALTH"
            if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "✅ App is Synced and Healthy"
              exit 0
            fi
            if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Progressing" ] && [ "$i" -ge 10 ]; then
              echo "✅ App is Synced (Health still Progressing — Ingress controller stabilizing)"
              exit 0
            fi
            sleep 15
          done
          echo "❌ Timeout waiting for sync"
          kubectl describe application go-portfolio -n argocd
          exit 1

      - name: Print App Status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n go-app
          echo "=== Service ==="
          kubectl get svc -n go-app
          echo "=== Ingress (waiting for ADDRESS) ==="
          kubectl wait --for=jsonpath='{.status.loadBalancer.ingress}' \
            ingress/go-portfolio-chart-ingress -n go-app --timeout=120s || true
          kubectl get ingress -n go-app
          LB=$(kubectl get ingress go-portfolio-chart-ingress -n go-app \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          [ -n "$LB" ] && echo "App URL: http://$LB" || echo "Ingress ADDRESS not ready yet"
          echo "=== ArgoCD Admin Password ==="
          kubectl get secret argocd-initial-admin-secret \
            -n argocd \
            -o jsonpath="{.data.password}" | base64 -d
          echo ""
