replicaCount: 2

image:
  repository: 6609650079/go-port
  tag: "25625032151"
  pullPolicy: Always

namespace: go-app

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  host: ""
  path: /
  pathType: Prefix
  tls:
    enabled: false
    # Set to true and provide secretName when cert-manager is configured
    secretName: ""

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
